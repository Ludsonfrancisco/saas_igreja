{% comment %}Cadastro/edição de Escala (Sprint 5 / Frente 1). CSRF obrigatório.{% endcomment %}
<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="utf-8"><title>Escala</title></head>
<body>
  <h1>{% if form.instance.pk %}Editar escala{% else %}Nova escala{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
  </form>

  <p><a href="{% url 'schedules:list' %}">Voltar</a></p>
</body>
</html>
