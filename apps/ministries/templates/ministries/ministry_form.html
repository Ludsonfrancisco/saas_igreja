{% comment %}Cadastro/edição de Ministério (Frente 3 / Bloco 3). CSRF obrigatório.{% endcomment %}
<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="utf-8"><title>Ministério</title></head>
<body>
  <h1>{% if form.instance.pk %}Editar ministério{% else %}Novo ministério{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
  </form>

  <p><a href="{% url 'ministries:list' %}">Voltar</a></p>
</body>
</html>
