{% comment %}Item de navegação (renderizado por {% nav_link %}). Props: path, label, icon, active.{% endcomment %}
<a href="{{ path }}"
   class="flex items-center gap-3 rounded-lg px-3 py-2 {% if active %}bg-accent/10 font-medium text-accent{% else %}text-ink hover:bg-bg-soft{% endif %}"
   {% if active %}aria-current="page"{% endif %}>
  <i data-lucide="{{ icon }}" class="h-5 w-5 shrink-0 {% if active %}text-accent{% else %}text-muted{% endif %}"></i>
  <span>{{ label }}</span>
</a>
