{% comment %}Badge/etiqueta. Uso:
  {% include 'components/badge.html' with text='Ativo' variant='success' %}
Props: text; variant ∈ accent|success|danger|muted (default accent).{% endcomment %}
<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium
  {% if variant == 'success' %}bg-success/10 text-success
  {% elif variant == 'danger' %}bg-danger/10 text-danger
  {% elif variant == 'muted' %}bg-line/40 text-muted
  {% else %}bg-accent/10 text-accent{% endif %}">
  {{ text }}
</span>
